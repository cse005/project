{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role | Kisan Asara</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --prime-green: #118a28;
            --dark-green: #042409;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;

            /* 3D METALLIC GLOSSY GREEN BACKGROUND */
            background-color: #010a02;
            background-image:
                radial-gradient(circle at 30% 70%, rgba(25, 171, 64, 0.6) 0%, transparent 45%),
                radial-gradient(circle at 75% 25%, rgba(13, 102, 37, 0.8) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, #063d14 0%, #000000 100%);
            background-attachment: fixed;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            z-index: 2;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        header h2 {
            font-size: clamp(32px, 5vw, 46px);
            color: #ffffff;
            font-weight: 800;
            text-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        header p {
            color: #90d69b;
            /* Soft glowing light green */
            font-weight: 500;
            font-size: 16px;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1200px;
            padding-bottom: 50px;
            z-index: 2;
        }

        /* Frosted Glass Cards */
        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 28px;
            padding: 35px 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.6s ease-out backwards;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Staggered animation for cards */
        .card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .card:nth-child(3) {
            animation-delay: 0.3s;
        }

        .card:nth-child(4) {
            animation-delay: 0.4s;
        }

        .card:nth-child(5) {
            animation-delay: 0.5s;
        }

        /* Shine effect */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.8), transparent);
            transform: skewX(-25deg);
            transition: 0.5s;
            z-index: 1;
            pointer-events: none;
        }

        .card:hover::before {
            left: 150%;
        }

        .card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: var(--prime-green);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        .img-wrapper {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #e0e0e0;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            background: white;
            padding: 4px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
            position: relative;
        }

        .card:hover .img-wrapper {
            transform: rotate(5deg) scale(1.08);
            border-color: var(--prime-green);
            box-shadow: 0 15px 25px rgba(17, 138, 40, 0.3);
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .card p {
            color: var(--dark-green);
            font-size: 18px;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 2;
            position: relative;
        }

        @media (max-width: 480px) {
            .container {
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }

            .card {
                padding: 25px 10px;
                border-radius: 20px;
            }

            .img-wrapper {
                width: 90px;
                height: 90px;
                margin-bottom: 15px;
            }

            .card p {
                font-size: 14px;
            }

            header h2 {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <button onclick="window.history.back()" class="back-btn" style="position:fixed;top:16px;left:16px;z-index:9999;">Back</button>
    <header>
        <h2>Select Your Role</h2>
        <p>Your journey with Kisan Asara starts here</p>
    </header>

    <div class="container">
        <a href="{% url 'farmer_register' %}" class="card">
            <div class="img-wrapper"><img src="{% static 'kisan1/images/farmer.jpg' %}" alt="Farmer"></div>
            <p>Farmer</p>
        </a>
        <a href="{% url 'tractor_register' %}" class="card">
            <div class="img-wrapper"><img src="{% static 'kisan1/images/tractor.jpg' %}" alt="Tractor Driver"></div>
            <p>Tractor Driver</p>
        </a>
        <a href="{% url 'labor_register' %}" class="card">
            <div class="img-wrapper"><img src="{% static 'kisan1/images/labor.jpg' %}" alt="Labor"></div>
            <p>Labor</p>
        </a>
        <a href="{% url 'lease_register' %}" class="card">
            <div class="img-wrapper"><img src="{% static 'kisan1/images/lease.jpg' %}" alt="Lease Owner"></div>
            <p>Lease Owner</p>
        </a>
        <a href="{% url 'tools_register' %}" class="card">
            <div class="img-wrapper"><img src="{% static 'kisan1/images/tools.jpg' %}" alt="Rented Tools"></div>
            <p>Rented Tools</p>
        </a>
    </div>

</body>

</html>

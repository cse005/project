<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Verify OTP | Kisan Asara</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0b2e24 0%, #1b5e20 100%);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 400px;
            padding: 45px 35px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .icon-box {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .logo-area {
            font-size: 26px;
            font-weight: 800;
            color: #0b2e24;
            margin-bottom: 10px;
        }

        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 15px;
            font-size: 24px;
            text-align: center;
            letter-spacing: 10px;
            font-weight: 700;
            outline: none;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        input:focus {
            border-color: #2e7d32;
            background: #fff;
        }

        .btn-verify {
            width: 100%;
            padding: 16px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-verify:hover {
            background: #1b5e20;
            transform: translateY(-2px);
        }

        .back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            background: rgba(255,255,255,0.9);
            color: #0b2e24;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 10px;
            font-weight: 700;
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }
    </style>
</head>

<body>
    <a href="{% url 'otp_back' %}" class="back-btn">⬅ Back</a>
    <div class="login-card">
        <div class="icon-box">🔑</div>
        <div class="logo-area">Verify OTP</div>
        <p style="color: #666; font-size: 14px; margin-bottom: 25px;">
            Enter the 4-digit code sent to your terminal
        </p>

        {% if error %}
        <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        <!-- ✅ FIXED HERE -->
        <form method="POST" action="{% url 'verify_pesticide_otp' %}">
            {% csrf_token %}
            <input type="text" name="otp" maxlength="4" placeholder="{% trans '0000' %}" inputmode="numeric" required>
            <button type="submit" class="btn-verify">Verify & Register</button>
        </form>
    </div>
</body>

</html>
